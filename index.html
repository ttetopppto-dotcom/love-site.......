<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لأجمل بنوته في الدنيا 🤭♥</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(180deg,#120012,#1b001b,#000);
overflow-x:hidden;
color:white;
text-align:center;
min-height:100vh;
position:relative;
}

/* خلفية */
.bg-slider{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at top,#ff4f9555,#000000),
radial-gradient(circle at bottom,#ff008055,#000000);
filter:blur(20px);
opacity:.8;
}

/* النجوم */
.stars{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

/* القلوب */
.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-50px;
color:#ff4f95;
animation:floatUp linear infinite;
opacity:.5;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:.7;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* شاشة الباسورد */
#passwordScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
padding:20px;
}

.pass-box{
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
width:100%;
max-width:350px;
box-shadow:0 0 30px rgba(255,0,120,.4);
}

.pass-box h1{
font-size:28px;
margin-bottom:20px;
color:#ff4f95;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:18px;
text-align:center;
margin-top:15px;
}

button{
background:#ff4f95;
color:white;
border:none;
padding:15px 25px;
border-radius:15px;
font-size:18px;
margin-top:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* المحتوى */
.container{
display:none;
position:relative;
z-index:2;
padding:30px 15px 80px;
}

/* الموسيقى */
.music{
margin-top:20px;
}

.main-title{
font-size:42px;
color:#ff4f95;
margin-top:30px;
text-shadow:0 0 20px rgba(255,0,120,.5);
}

.typewriter{
font-size:23px;
line-height:2;
margin-top:25px;
min-height:180px;
padding:15px;
}

/* الصور */
.gallery{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:30px;
}

.photo-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:15px;
border-radius:25px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,.1);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.03);
}

.photo-card p{
margin-top:12px;
font-size:20px;
line-height:1.8;
}

/* العداد */
.counter-box{
margin-top:40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
padding:20px;
border-radius:25px;
}

.counter-title{
font-size:25px;
color:#ff4f95;
margin-bottom:15px;
}

#counter{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.time-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:25px;
border:1px solid #ff4f95;
animation:pulse 2s infinite;
}

.time-number{
font-size:35px;
font-weight:bold;
color:#ff4f95;
}

.time-label{
font-size:18px;
margin-top:10px;
color:white;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

/* الرسائل */
.secret-btn{
margin-top:35px;
}

.secret-message,
.love-popup,
#hiddenText{
display:none;
margin-top:25px;
font-size:24px;
line-height:2;
animation:fade 1s ease;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* سؤال الحب */
.love-question{
margin-top:40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
}

.love-buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
position:relative;
height:80px;
}

.no-btn{
position:absolute;
right:20%;
}

/* الذكريات */
.memory-box{
margin-top:50px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
}

.memory{
margin-top:15px;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:15px;
line-height:2;
font-size:20px;
}

/* النهاية */
.footer{
margin-top:50px;
font-size:20px;
opacity:.8;
padding-bottom:40px;
}

</style>

</head>

<body>

<div class="bg-slider"></div>
<div class="stars"></div>
<div class="hearts"></div>

<div id="passwordScreen">
<div class="pass-box">
<h1>ادخلي الباسورد 🤭♥</h1>
<input type="password" id="password" placeholder="اكتبيه هنا">
<button onclick="checkPassword()">فتح المفاجأة ♥</button>
</div>
</div>

<div class="container" id="mainContent">

<!-- 🎧 الموسيقى -->
<div class="music">
<audio id="bgMusic" autoplay loop>
<source src="2087371553_tk (16).mp3" type="audio/mpeg">
</audio>
</div>

<h1 class="main-title">لأجمل بنوته في الدنيا 🤭♥</h1>
<div class="typewriter" id="typewriter"></div>

</div>

<script>

/* تشغيل الصوت */
document.addEventListener("click", function () {
let music=document.getElementById("bgMusic");
music.play();
}, { once:true });

let music=document.getElementById("bgMusic");
music.volume=0;

let fade=setInterval(()=>{
if(music.volume<1){
music.volume+=0.05;
}else{
clearInterval(fade);
}
},300);

</script>

</body>
  </html>
